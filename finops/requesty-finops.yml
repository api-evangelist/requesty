description: >-
  FinOps view of Requesty gateway spend. Requesty bills usage-based on the
  underlying routed model's base token rates plus a 5% routing markup, with a
  Free tier capped at 200 requests/day on free models. Every request returns a
  Requesty USD `cost` field, and per-key and organization-level usage/spend
  reporting supports allocation and budgeting. Caching and fallbacks reduce
  effective spend; BYOK shifts base model cost to the customer's own provider
  accounts while Requesty applies its routing fee.
notes: >-
  The 5% markup and Free-tier cap are as published on the Requesty pricing
  page; per-model base rates change frequently and should be verified against
  the Requesty models page during reconciliation.
sources:
- https://www.requesty.ai/pricing
- https://docs.requesty.ai
- https://focus.finops.org/focus-specification/v1-3/
