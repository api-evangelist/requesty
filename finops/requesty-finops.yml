meters:
- name: input_tokens
  description: Tokens sent in routed chat/embedding requests, billed at the routed model base rate plus 5% markup.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - api_key
  - model
  - provider
- name: output_tokens
  description: Tokens generated by the routed model, billed at the base rate plus 5% markup.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - api_key
  - model
  - provider
- name: routing_markup
  description: 5% markup applied on top of the underlying base model cost for routed traffic.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - api_key
- name: request_cost
  description: Per-request Requesty USD cost returned in the usage.cost field of each response.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - api_key
  - model
- name: cached_requests
  description: Requests served from response cache, reducing upstream model spend.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
principles:
- name: Visibility
  description: Read the per-request usage.cost field and pull per-key and organization usage reports to inspect spend by model and provider.
- name: Allocation
  description: Tag and label API keys per workload/team and map them to internal cost centers using key-level usage reporting.
- name: Optimization
  description: Enable response caching, use fallbacks to cheaper providers, route lower-stakes work to free or smaller models, and use BYOK to push base cost to existing provider contracts.
- name: Accountability
  description: Assign per-key spending limits and budget caps, assign owners per project/key, and review spend monthly against budget.
